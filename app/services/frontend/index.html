<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>DeepAgent 对话</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    body { margin: 20px; font-family: sans-serif; }
    #chatbox {
      width: 100%; max-width: 800px; height: 70vh;
      overflow-y: auto; border: 1px solid #ccc; padding: 10px;
      margin-bottom: 10px;
    }
    .msg { margin-bottom: 8px; white-space: pre-wrap; }
    .user { color: blue; }
    .assistant { color: green; }
    .chart-container { width: 100%; height: 400px; margin-top: 10px; }
    #input-area { display: flex; max-width: 800px; }
    #message-input { flex: 1; padding: 8px; }
    #send-btn { padding: 8px 20px; margin-left: 5px; }
  </style>
</head>
<body>
  <h2>DeepAgent 对话</h2>
  <div id="chatbox"></div>
  <div id="input-area">
    <input id="message-input" placeholder="输入消息..." />
    <button id="send-btn">发送</button>
  </div>

  <script>
    const chatbox = document.getElementById("chatbox");
    const input = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");

    function appendUserMessage(text) {
      const div = document.createElement("div");
      div.className = "msg user";
      div.textContent = "你: " + text;
      chatbox.appendChild(div);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function createAssistantMessage() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.textContent = "助手: ";
      chatbox.appendChild(div);
      return div;
    }

    function renderChart(container, option) {
      const chartId = "echart_" + Date.now();
      const chartDiv = document.createElement("div");
      chartDiv.id = chartId;
      chartDiv.className = "chart-container";
      container.appendChild(chartDiv);
      const chart = echarts.init(chartDiv);
      chart.setOption(option);
      window.addEventListener("resize", () => chart.resize());
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      appendUserMessage(message);
      input.value = "";
      // 创建助手消息占位
      const assistantDiv = createAssistantMessage();

      // 发起 SSE POST 请求
      const response = await fetch("/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // 按行解析 SSE 事件
        const lines = buffer.split("\n");
        buffer = lines.pop();  // 保留不完整的行

        for (const line of lines) {
          if (line.startsWith("data: ")) {
            const dataStr = line.substring(6);
            if (dataStr === "{\"type\": \"done\"}") return; // 结束
            try {
              const data = JSON.parse(dataStr);
              if (data.type === "token") {
                // 追加文本
                const current = assistantDiv.textContent.replace("助手: ", "") || "";
                assistantDiv.textContent = "助手: " + current + data.content;
              } else if (data.type === "chart" && data.chart_option) {
                // 收到图表数据，插入图表容器
                renderChart(assistantDiv, data.chart_option);
              }
              chatbox.scrollTop = chatbox.scrollHeight;
            } catch (e) {
              console.warn("SSE 解析错误", e);
            }
          }
        }
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
